<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradients matching the branding -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b" />
      <stop offset="100%" style="stop-color:#fef08a" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="#0b0e17" />
  
  <!-- Sleek Glowing border -->
  <rect width="472" height="472" x="20" y="20" rx="108" fill="none" stroke="url(#borderGrad)" stroke-width="6" opacity="0.4" />
  
  <!-- Outer Book Outline Glow -->
  <path d="M256 360 C210 350 150 325 130 240 C110 170 140 100 190 90 C230 80 250 150 256 180 C262 150 282 80 322 90 C372 100 402 170 382 240 C362 325 302 350 256 360 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#glow)" opacity="0.7" />

  <!-- Left Page (Indigo/Constellation) -->
  <path d="M251 340 C230 335 175 315 155 240 C140 180 160 125 195 115 C225 105 245 160 251 190 Z" fill="url(#blueGrad)" stroke="#6366f1" stroke-width="1.5" />
  
  <!-- Right Page (Gold/Calligraphy) -->
  <path d="M261 340 C282 335 337 315 357 240 C372 180 352 125 317 115 C287 105 267 160 261 190 Z" fill="url(#goldGrad)" stroke="#f59e0b" stroke-width="1.5" />
  
  <!-- Left Page Constellation/Stars -->
  <g opacity="0.8">
    <line x1="175" y1="180" x2="200" y2="160" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2,2" />
    <line x1="200" y1="160" x2="225" y2="210" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2,2" />
    <line x1="225" y1="210" x2="190" y2="240" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2,2" />
    
    <circle cx="175" cy="180" r="3" fill="#ffffff" />
    <circle cx="200" cy="160" r="4.5" fill="#ffffff" filter="url(#glow-light)" />
    <circle cx="225" cy="210" r="3" fill="#ffffff" />
    <circle cx="190" cy="240" r="3" fill="#ffffff" />
  </g>

  <!-- Stylized Arabic Calligraphy 'Kalima' (كلمة) -->
  <g fill="#ffffff" transform="translate(272, 160) scale(0.9)">
    <path d="M60,15 C75,15 80,30 80,45 C80,75 55,85 45,85 C35,85 30,75 35,65 C40,55 55,55 60,65 C62,70 65,70 67,65 C72,50 62,35 50,35 C42,35 35,42 35,50 C35,65 48,80 40,90 C35,95 22,95 15,85 C10,78 12,65 20,55 C28,45 35,50 35,55 C35,58 32,60 30,60 C25,60 22,55 24,50 C27,40 40,25 60,15 Z" />
    <!-- Harakat (Diacritics: Fatha and Damma) -->
    <path d="M55,5 L70,-5 L65,-10 L50,0 Z" fill="#f59e0b" />
    <path d="M22,35 C22,25 30,20 30,25 C30,30 25,35 22,35 Z" fill="#f59e0b" />
  </g>

  <!-- Sparkles -->
  <g fill="#f59e0b">
    <!-- Top Right Sparkle -->
    <path d="M380 120 l3 8 l8 3 l-8 3 l-3 8 l-3-8 l-8-3 l8-3 z" filter="url(#glow-light)" />
    <!-- Bottom Left Sparkle -->
    <path d="M130 280 l2 5 l5 2 l-5 2 l-2 5 l-2-5 l-5-2 l5-2 z" opacity="0.6" />
  </g>
</svg>
